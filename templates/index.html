<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>code.teach</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <h1>code.teach</h1>
        <p>Hands-on coding tutoring, delivered in the browser.</p>
        <form id="setup-form" class="card">
          <label>Topic</label>
          <input id="topic" value="Python Variables" />
          <label>Level</label>
          <select id="level">
            <option value="beginner">Beginner</option>
            <option value="intermediate">Intermediate</option>
            <option value="advanced">Advanced</option>
          </select>
          <button type="submit">Start session</button>
        </form>
        <div class="card">
          <h3>Signals</h3>
          <div class="signal-grid">
            <button data-signal="too_hard">Too Hard</button>
            <button data-signal="too_easy">Too Easy</button>
            <button data-signal="lost_concept">Lost</button>
            <button data-signal="more_practice">Practice</button>
          </div>
        </div>
      </aside>

      <main class="main-panel">
        <div id="messages" class="messages"></div>
        <div class="editor-card">
          <textarea id="code" spellcheck="false">print('Hello from code.teach')
</textarea>
          <button id="submit-btn">Submit code</button>
        </div>
      </main>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
